version: "3.8"
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: perf_calc
      MYSQL_USER: perf
      MYSQL_PASSWORD: perf
    ports:
      - "3307:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
  app:
    build: .
    environment:
      DATABASE_URL: mysql+pymysql://perf:perf@db:3306/perf_calc?charset=utf8mb4
    depends_on:
      - db
    ports:
      - "8000:8000"
